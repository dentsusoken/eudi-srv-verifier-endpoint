version: '3.3'

services:
  verifier:
    profiles: ["base"]
    image: ghcr.io/eu-digital-identity-wallet/eudi-srv-verifier-endpoint:latest
    container_name: verifier-backend
    ports:
      - "8080:8080"
    environment:
      VERIFIER_PUBLICURL: "https://10.240.174.10"
      VERIFIER_RESPONSE_MODE: "DirectPost"
      VERIFIER_ACCESS_CERTIFICATE_SIGNING_ALGORITHM: "ES512"
      VERIFIER_ACCESS_CERTIFICATE_KEYSTORE: "file:///certs/keystore.jks"
      VERIFIER_ACCESS_CERTIFICATE_KEYSTORE_TYPE: "jks"
      VERIFIER_ACCESS_CERTIFICATE_KEYSTORE_PASSWORD: "keystore"
      VERIFIER_ACCESS_CERTIFICATE_ALIAS: "access_certificate"
      VERIFIER_ACCESS_CERTIFICATE_PASSWORD: "access_certificate"
    volumes:
      - ./keystore.jks:/certs/keystore.jks

  verifier-ui:
    profiles: ["base"]
    image: ghcr.io/eu-digital-identity-wallet/eudi-web-verifier:latest
    container_name: verifier-ui
    ports:
      - "4300:4300"
    environment:
      - DOMAIN_NAME=""
      - HOST_API="https://10.240.174.10"

  haproxy:
    profiles: ["base"]
    image: haproxy:2.7.2
    container_name: haproxy
    ports:
      - "443:443"
    volumes:
      - ./haproxy.conf:/usr/local/etc/haproxy/haproxy.cfg
      - ./haproxy.pem:/etc/ssl/certs/mysite.pem

  # --- local profile services ---
  # Usage: docker compose --profile local up --build
  # Prerequisite: bash ../../eudi-srv-verifier-endpoint/scripts/setup-verifier-certs.sh
  #               bash ../../eudi-web-verifier/scripts/patch_nii_demo.sh

  verifier-backend-local:
    profiles: ["local"]
    build:
      context: ..
      dockerfile: docker/Dockerfile_local
    container_name: verifier-backend-local
    ports:
      - "8080:8080"
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: "file:/config/"
      VERIFIER_ACCESS_CERTIFICATE_KEYSTORE: "file:///certs/keystore.jks"
      VERIFIER_PUBLICURL: "https://localhost"
    volumes:
      - ../src/main/resources/application-local.properties:/config/application-local.properties:ro
      - ../src/main/resources/keystore.jks:/certs/keystore.jks:ro

  verifier-ui-local:
    profiles: ["local"]
    build:
      context: ../../eudi-web-verifier
      dockerfile: Dockerfile_local
    container_name: verifier-ui-local
    ports:
      - "4200:4300"
    environment:
      BACKEND_URL: "http://verifier-backend-local:8080"
    depends_on:
      - verifier-backend-local

  haproxy-local:
    profiles: ["local"]
    image: haproxy:2.7.2
    container_name: haproxy-local
    ports:
      - "443:443"
    volumes:
      - ./haproxy-local.conf:/usr/local/etc/haproxy/haproxy.cfg
      - ./haproxy.pem:/etc/ssl/certs/mysite.pem
    depends_on:
      - verifier-backend-local
      - verifier-ui-local
